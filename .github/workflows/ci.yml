# .github/workflows/ci.yml — per tech-architecture.md § 8.2.
#
# Five-stage CI pipeline gating every PR to main and every push to main:
#   1. install (pnpm --frozen-lockfile)
#   2. lint
#   3. typecheck
#   4. test  (the 200-fixture determinism suite runs here automatically —
#            packages/sim's harness.test.ts matches the default vitest
#            pattern, so `pnpm turbo test` covers it)
#   5. build
#
# Any deviation from this sequence requires a decision-log entry.
#
# Spec deviation: tech-architecture.md § 8.2 lists determinism as a separate
# stage 5 of a six-stage pipeline. M1.2.5.1 folds it into stage 4 (test) so
# the determinism suite is non-skippable by the same mechanism that protects
# unit tests, rather than by a parallel "don't skip me" convention. See the
# M1.2.5.1 closing decision-log entry for the rationale.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    name: install / lint / typecheck / test / build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Real-Postgres service container (M2.1 PR3 / CF-73 / Rule 4 broadened).
    #
    # Phase 1 REJECTED a fake-store-only plan and required a real-Postgres
    # test, leaving testcontainers-vs-service-container to Phase 2. Chosen:
    # service container. testcontainers needs a Docker daemon, which the dev
    # box lacks — the harness would be unrunnable locally, so nobody could
    # verify it before pushing. This needs no Docker in test code.
    #
    # The credentials here are NOT secrets — they are a throwaway container
    # on localhost. That is the whole point: § 8.2's secretless-CI posture is
    # exactly why the AccountStore SQL gap (Catch 58) survived, because a
    # `skipIf(!DATABASE_URL)` test would silently skip in CI and give zero
    # protection. With a non-secret URL the real-SQL suite ALWAYS runs here,
    # and the harness THROWS rather than skips when CI=true and the var is
    # unset (src/__tests__/realsql/harness.ts).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pba_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # Version is read from package.json's `packageManager` field
        # (currently pnpm@9.15.0) — keeping the CI pnpm pinned to the
        # repo's declared version rather than floating to latest 9.x.
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo lint

      - name: Typecheck
        run: pnpm turbo typecheck

      - name: Test
        run: pnpm turbo test
        env:
          # Consumed by src/__tests__/realsql/harness.ts. Non-secret by
          # construction (throwaway localhost container), so the real-SQL
          # suite is non-skippable here — see the `services` block above.
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/pba_test
          CI: 'true'

      - name: Build
        run: pnpm turbo build
