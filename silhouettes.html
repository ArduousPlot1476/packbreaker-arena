<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Silhouette test — anchor icons (monochrome 32×32)</title>
    <style>
      body {
        background: #ffffff;
        margin: 0;
        padding: 48px;
        font-family: 'Inter', system-ui, sans-serif;
        color: #000;
      }
      h1 {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        margin: 0 0 28px;
      }
      h2 {
        font-size: 11px;
        font-weight: 600;
        margin: 36px 0 12px;
        color: #444;
      }
      .row {
        display: flex;
        gap: 64px;
        align-items: flex-end;
      }
      .cell {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }
      .label {
        font-size: 11px;
      }
      .swatch {
        filter: grayscale(1) brightness(0) contrast(1000%);
        background: #fff;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/silhouettes.tsx"></script>
  </body>
</html>
